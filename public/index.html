<!DOCTYPE html>
<html>
<!-- [Previous head and styles remain exactly the same] -->
<body>
    <!-- [Previous HTML structure remains the same] -->

    <script>
        // Enhanced API handler with JSON parsing safeguards
        async function handleResponse(response) {
            const text = await response.text();
            try {
                return text ? JSON.parse(text) : {};
            } catch (e) {
                console.error('JSON parse error:', text);
                throw new Error('Invalid server response');
            }
        }

        async function makeRequest(endpoint, data) {
            try {
                const response = await fetch(`/.netlify/functions/server/${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                
                const result = await handleResponse(response);
                
                if (!response.ok) {
                    throw new Error(result.error || `HTTP error! status: ${response.status}`);
                }
                
                return result;
                
            } catch (error) {
                console.error('API Error:', error);
                showError(error.message || 'Network error. Please try again.');
                return { error: error.message };
            }
        }

        // [Rest of your existing JavaScript code remains the same]
    </script>
</body>
</html>
