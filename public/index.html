```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- NO MORE META CSP - WE'LL USE NETLIFY HEADERS INSTEAD -->
    <title>NOIR UNCHAINED</title>
    <style>
        body {
            background: #000;
            color: #00ffa3;
            font-family: monospace;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .noir-terminal {
            background: #111;
            border: 1px solid #00ffa3;
            padding: 2rem;
            width: 300px;
        }
        input, button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #222;
            color: white;
            border: 1px solid #333;
        }
        button {
            background: #00ffa3;
            color: black;
            font-weight: bold;
            cursor: pointer;
        }
        #error {
            color: #ff4d4d;
            height: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="noir-terminal">
        <h1>NOIR SYSTEM</h1>
        <input id="username" placeholder="Username" autocomplete="username">
        <input id="password" type="password" placeholder="Password" autocomplete="current-password">
        <button id="loginBtn">LOGIN</button>
        <button id="createBtn">CREATE</button>
        <div id="error"></div>
    </div>

    <!-- RAW JAVASCRIPT - NO EVAL, NO CSP BLOCKS -->
    <script>
        // HARDENED FETCH
        const noirFetch = async (endpoint, data) => {
            try {
                const response = await fetch(
                    `/.netlify/functions/server/${endpoint}`,
                    {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    }
                );
                return await response.json();
            } catch (err) {
                document.getElementById('error').textContent = "SYSTEM ERROR";
                return { error: true };
            }
        };

        // BUTTON ACTIONS
        document.getElementById('loginBtn').onclick = async () => {
            const res = await noirFetch('login', {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            });
            if (!res.error) alert("ACCESS GRANTED");
        };

        document.getElementById('createBtn').onclick = async () => {
            const res = await noirFetch('create', {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            });
            if (!res.error) alert("ACCOUNT CREATED");
        };

        // VISUAL CONFIRMATION
        document.querySelector('h1').style.textShadow = "0 0 10px #00ffa3";
        console.log("NOIR INTERFACE ACTIVE");
    </script>
</body>
</html>
